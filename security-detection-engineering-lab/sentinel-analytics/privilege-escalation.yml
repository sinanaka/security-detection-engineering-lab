id: 9f7f2d9d-1111-4e21-9b0e-000000000002
name: Suspicious Privilege Escalation
description: Detect sensitive Azure AD or Entra role assignments.
severity: High
kind: Scheduled
queryFrequency: 1h
queryPeriod: 24h
triggerOperator: GreaterThan
triggerThreshold: 0
tactics:
  - Persistence
  - PrivilegeEscalation
relevantTechniques:
  - T1098
  - T1078
query: |
  let sensitiveRoles = dynamic([
    "Global Administrator",
    "Privileged Role Administrator",
    "Security Administrator",
    "User Administrator",
    "Conditional Access Administrator"
  ]);
  AuditLogs
  | where TimeGenerated >= ago(24h)
  | where OperationName has_any (
      "Add member to role",
      "Add eligible member to role",
      "Add permanent eligible role assignment",
      "Add role assignment"
    )
  | extend Initiator = tostring(InitiatedBy.user.userPrincipalName)
  | mv-expand TargetResources
  | extend TargetResourceDisplayName = tostring(TargetResources.displayName)
  | mv-expand modifiedProperties = TargetResources.modifiedProperties
  | extend RoleName = tostring(modifiedProperties.newValue)
  | where RoleName has_any (sensitiveRoles)
  | project TimeGenerated, OperationName, Initiator, TargetResourceDisplayName, RoleName, Result
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: Initiator
version: 1.0.0
status: Available
